name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vet, staticcheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: lint-guard (Frame methods must not return []byte)
        run: |
          count=$(grep -rn 'Frame().*\[\]byte' --include='*.go' . | grep -v '_test.go' | wc -l)
          if [ "$count" -ne 0 ]; then
            echo "ERROR: *Frame methods returning []byte violate the naming convention:"
            grep -rn 'Frame().*\[\]byte' --include='*.go' . | grep -v '_test.go'
            exit 1
          fi

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: go test (race)
        run: go test -race -count=1 ./...
